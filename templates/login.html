<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; background:#f4f4f4; padding:20px }
        form { max-width:360px; margin:40px auto; background:#fff; padding:20px; border-radius:8px }
        input { width:100%; padding:8px; margin:8px 0 }
        button { background:#075e54; color:#fff; padding:8px 12px; border:none; cursor:pointer }
        a { display:block; text-align:center; margin-top:10px }
    </style>
</head>
<body>

<h2 style="text-align:center">Admin Login</h2>

<form action="/login" method="POST">
    <label for="username">Username</label>
    <input id="username" name="username" type="text" required>

    <label for="password">Password</label>
    <input id="password" name="password" type="password" required>

    <button type="submit">Login</button>
</form>

<a href="/">Back to Chat</a>

</body>
</html>
