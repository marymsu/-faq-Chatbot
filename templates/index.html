<!DOCTYPE html>
<html>
<head>
    <title>Campus Buddy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ece5dd;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background: white;
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .chat-header {
            background: #075e54;
            color: white;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 75%;
            padding: 10px 15px;
            margin-bottom: 10px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-in-out;
        }

        .user {
            align-self: flex-end;
            background: #dcf8c6;
            border-bottom-right-radius: 3px;
        }

        .bot {
            align-self: flex-start;
            background: #f1f0f0;
            border-bottom-left-radius: 3px;
        }

        .timestamp {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.6;
        }

        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
            background: #f7f7f7;
        }

        .input-area input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
        }

        .input-area button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 20px;
            background: #075e54;
            color: white;
            cursor: pointer;
        }

        .input-area button:hover {
            background: #0b7d6e;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        🎓 Campus Buddy
    </div>

    <div class="chat-box" id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="message" placeholder="Type a message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const inputField = document.getElementById("message");

    inputField.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });

    function getTime() {
        const now = new Date();
        return now.getHours().toString().padStart(2, '0') + ":" +
               now.getMinutes().toString().padStart(2, '0');
    }

    function appendMessage(text, className) {
        const chatBox = document.getElementById("chat-box");
        const messageDiv = document.createElement("div");
        messageDiv.classList.add("message", className);

        // use innerHTML so that any HTML tags in the response are rendered
        // (switch to textContent if you need to escape user‑supplied content)
        messageDiv.innerHTML = `
            ${text}
            <div class="timestamp">${getTime()}</div>
        `;

        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTypingIndicator() {
        const chatBox = document.getElementById("chat-box");
        const typingDiv = document.createElement("div");
        typingDiv.classList.add("message", "bot");
        typingDiv.id = "typing-indicator";
        typingDiv.innerText = "Bot is typing...";
        chatBox.appendChild(typingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTypingIndicator() {
        const typing = document.getElementById("typing-indicator");
        if (typing) typing.remove();
    }

    function sendMessage() {
        const message = inputField.value.trim();
        if (message === "") return;

        appendMessage(message, "user");
        inputField.value = "";

        // Disable input while waiting so user cannot double-send
        inputField.disabled = true;
        document.querySelector(".input-area button").disabled = true;

        showTypingIndicator();

        const startTime = Date.now();

        fetch("/get_response", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: message })
        })
        .then(response => response.json())
        .then(data => {
            const elapsed = Date.now() - startTime;
            // DB hits are fast: add 200ms polish. NLP is slow: show immediately.
            const minDelay = elapsed < 600 ? 200 : 0;
            setTimeout(() => {
                removeTypingIndicator();
                appendMessage(data.response, "bot");
                inputField.disabled = false;
                document.querySelector(".input-area button").disabled = false;
                inputField.focus();
            }, minDelay);
        })
        .catch(() => {
            removeTypingIndicator();
            appendMessage("Sorry, something went wrong. Please try again.", "bot");
            inputField.disabled = false;
            document.querySelector(".input-area button").disabled = false;
        });
    }
</script>

</body>
</html>
